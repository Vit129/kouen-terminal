name: Harness
options:
  bundleIdPrefix: com.robert
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    # Harness does not ship App Intents or App Shortcuts. Disabling App Intents
    # link generation keeps Xcode runs from repeatedly talking to linkd's
    # autoShortcut service for metadata we do not use.
    LM_ENABLE_LINK_GENERATION: NO
    LM_FILTER_WARNINGS: YES
    ENABLE_APPINTENTS_DEPLOYMENT_AWARE_PROCESSING: NO
packages:
  Harness:
    path: .
  libghostty-spm-fork:
    # Harness's libghostty fork (read-cells styled-grid API + Display-P3 colorspace).
    # Pinned by revision; XCFramework resolves from a GitHub release asset by
    # url+checksum — no sibling checkout, no Zig rebuild. For local fork dev, swap
    # back to `path: ../libghostty-spm-fork`.
    url: https://github.com/robzilla1738/libghostty-spm-fork.git
    revision: 16f6d4fd91ccc2688a5e7e835506e3b85c65ea2f
targets:
  Harness:
    type: application
    platform: macOS
    sources:
      - Apps/Harness/Sources/HarnessApp
      - Apps/Harness/Resources/Harness.icns
      - Apps/Harness/Resources/Assets.xcassets
    dependencies:
      - target: HarnessDaemon
        embed: false
      - target: harness-cli
        embed: false
      - package: Harness
        product: HarnessCore
      - package: Harness
        product: HarnessTerminalKit
      - package: libghostty-spm-fork
        product: GhosttyTerminal
      - package: libghostty-spm-fork
        product: GhosttyTheme
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.robert.harness
      INFOPLIST_FILE: Apps/Harness/Sources/HarnessApp/Resources/Info.plist
      CODE_SIGN_ENTITLEMENTS: Harness.entitlements
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    postBuildScripts:
      - name: Copy Bundled Tools
        script: |
          set -euo pipefail
          mkdir -p "$TARGET_BUILD_DIR/$EXECUTABLE_FOLDER_PATH"
          cp "$BUILT_PRODUCTS_DIR/HarnessDaemon" "$TARGET_BUILD_DIR/$EXECUTABLE_FOLDER_PATH/HarnessDaemon"
          cp "$BUILT_PRODUCTS_DIR/harness-cli" "$TARGET_BUILD_DIR/$EXECUTABLE_FOLDER_PATH/harness-cli"
        inputFiles:
          - $(BUILT_PRODUCTS_DIR)/HarnessDaemon
          - $(BUILT_PRODUCTS_DIR)/harness-cli
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(EXECUTABLE_FOLDER_PATH)/HarnessDaemon
          - $(TARGET_BUILD_DIR)/$(EXECUTABLE_FOLDER_PATH)/harness-cli
  HarnessDaemonCore:
    type: library.static
    platform: macOS
    sources:
      - Packages/HarnessDaemon/Sources/HarnessDaemon
    dependencies:
      - package: Harness
        product: HarnessCore
    settings:
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      # Pure-Swift target — no Objective-C consumers. Disabling the generated
      # `-Swift.h` header and defines-module avoids the libghostty umbrella
      # header warning about HarnessDaemonCore-Swift.h not being umbrellated.
      SWIFT_INSTALL_OBJC_HEADER: NO
      DEFINES_MODULE: NO
  HarnessDaemon:
    type: tool
    platform: macOS
    sources:
      - Packages/HarnessDaemon/Sources/HarnessDaemonMain
    dependencies:
      - target: HarnessDaemonCore
      - package: Harness
        product: HarnessCore
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.robert.harness.daemon
      PRODUCT_NAME: HarnessDaemon
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
  harness-cli:
    type: tool
    platform: macOS
    sources:
      - Tools/harness/Sources/HarnessCLI
    dependencies:
      - package: Harness
        product: HarnessCore
      - package: Harness
        product: HarnessTerminalKit
      - package: libghostty-spm-fork
        product: GhosttyTerminal
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.robert.harness.cli
      PRODUCT_NAME: harness-cli
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
  HarnessCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/HarnessCoreTests
    dependencies:
      - package: Harness
        product: HarnessCore
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.robert.harness.HarnessCoreTests
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
  HarnessDaemonTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/HarnessDaemonTests
    dependencies:
      - target: HarnessDaemonCore
      - package: Harness
        product: HarnessCore
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.robert.harness.HarnessDaemonTests
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
  HarnessTerminalKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/HarnessTerminalKitTests
    dependencies:
      - package: Harness
        product: HarnessCore
      - package: Harness
        product: HarnessTerminalKit
      - package: libghostty-spm-fork
        product: GhosttyTerminal
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.robert.harness.HarnessTerminalKitTests
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
schemes:
  Harness:
    build:
      targets:
        Harness: all
        HarnessDaemon: all
        harness-cli: all
        HarnessCoreTests: [test]
        HarnessDaemonTests: [test]
        HarnessTerminalKitTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HarnessCoreTests
        - HarnessDaemonTests
        - HarnessTerminalKitTests
