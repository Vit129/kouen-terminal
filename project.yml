name: Kouen
options:
  bundleIdPrefix: com.robert
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
settings:
  base:
    # Kouen does not ship App Intents or App Shortcuts. Disabling App Intents
    # link generation keeps Xcode runs from repeatedly talking to linkd's
    # autoShortcut service for metadata we do not use.
    LM_ENABLE_LINK_GENERATION: NO
    LM_FILTER_WARNINGS: YES
    ENABLE_APPINTENTS_DEPLOYMENT_AWARE_PROCESSING: NO
packages:
  Kouen:
    path: .
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
targets:
  Kouen:
    type: application
    platform: macOS
    sources:
      - Apps/Kouen/Sources/KouenApp
      - Apps/Kouen/Resources/Kouen.icns
      - Apps/Kouen/Resources/KouenLogo.png
      - Apps/Kouen/Resources/Assets.xcassets
      # Bundled "Symbols Nerd Font Mono" (MIT). A folder reference so it lands at
      # Contents/Resources/Fonts/ verbatim, matching ATSApplicationFontsPath = Fonts.
      - path: Apps/Kouen/Resources/Fonts
        type: folder
    dependencies:
      - target: KouenDaemon
        embed: false
      - target: kouen-cli
        embed: false
      - package: Kouen
        product: KouenCore
      - package: Kouen
        product: KouenTerminalKit
      - package: Kouen
        product: KouenTerminalRenderer
      - package: Kouen
        product: KouenTheme
      - package: Kouen
        product: KouenOnboarding
      # Sparkle ships as a binary xcframework via SPM; Xcode auto-embeds + code-signs
      # the resolved Sparkle.framework into Contents/Frameworks. Do NOT set embed/codeSign
      # here — XcodeGen would emit a Copy-Files phase referencing the bare product name
      # "Sparkle" (not "Sparkle.framework"), which fails with `lstat(.../Sparkle): No such
      # file or directory`. (The make-release path embeds it manually in package-app.sh.)
      - package: Sparkle
        product: Sparkle
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vit129.kouen
      INFOPLIST_FILE: Apps/Kouen/Sources/KouenApp/Resources/Info.plist
      CODE_SIGN_ENTITLEMENTS: Kouen.entitlements
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    postBuildScripts:
      - name: Copy Bundled Tools
        script: |
          set -euo pipefail
          mkdir -p "$TARGET_BUILD_DIR/$EXECUTABLE_FOLDER_PATH"
          cp "$BUILT_PRODUCTS_DIR/KouenDaemon" "$TARGET_BUILD_DIR/$EXECUTABLE_FOLDER_PATH/KouenDaemon"
          cp "$BUILT_PRODUCTS_DIR/kouen-cli" "$TARGET_BUILD_DIR/$EXECUTABLE_FOLDER_PATH/kouen-cli"
        inputFiles:
          - $(BUILT_PRODUCTS_DIR)/KouenDaemon
          - $(BUILT_PRODUCTS_DIR)/kouen-cli
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(EXECUTABLE_FOLDER_PATH)/KouenDaemon
          - $(TARGET_BUILD_DIR)/$(EXECUTABLE_FOLDER_PATH)/kouen-cli
  KouenDaemonCore:
    type: library.static
    platform: macOS
    sources:
      - Packages/KouenDaemon/Sources/KouenDaemon
    dependencies:
      - package: Kouen
        product: KouenCore
      - package: Kouen
        product: KouenTerminalEngine
      - package: Kouen
        product: CKouenSys
    settings:
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
      # Pure-Swift target — no Objective-C consumers. Disabling the generated
      # `-Swift.h` header and defines-module avoids a spurious umbrella-header
      # warning about KouenDaemonCore-Swift.h.
      SWIFT_INSTALL_OBJC_HEADER: NO
      DEFINES_MODULE: NO
      OTHER_SWIFT_FLAGS: "$(inherited) -Xcc -fmodule-map-file=$(GENERATED_MODULEMAP_DIR)/CKouenSys.modulemap"
  KouenDaemon:
    type: tool
    platform: macOS
    sources:
      - Packages/KouenDaemon/Sources/KouenDaemonMain
    dependencies:
      - target: KouenDaemonCore
      - package: Kouen
        product: KouenCore
      - package: Kouen
        product: KouenTerminalEngine
      - package: Kouen
        product: CKouenSys
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vit129.kouen.daemon
      PRODUCT_NAME: KouenDaemon
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
  kouen-cli:
    type: tool
    platform: macOS
    sources:
      - Tools/kouen/Sources/KouenCLI
    dependencies:
      - package: Kouen
        product: KouenCore
      - package: Kouen
        product: KouenTerminalEngine
      - package: Kouen
        product: KouenTerminalKit
      - package: Kouen
        product: KouenTheme
      - package: Kouen
        product: CKouenSys
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vit129.kouen.cli
      PRODUCT_NAME: kouen-cli
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
      OTHER_SWIFT_FLAGS: "$(inherited) -Xcc -fmodule-map-file=$(GENERATED_MODULEMAP_DIR)/CKouenSys.modulemap"
  KouenCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/KouenCoreTests
    dependencies:
      - package: Kouen
        product: KouenCore
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vit129.kouen.KouenCoreTests
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
  KouenDaemonTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/KouenDaemonTests
    dependencies:
      - target: KouenDaemonCore
      - package: Kouen
        product: KouenCore
      - package: Kouen
        product: KouenTerminalEngine
      - package: Kouen
        product: CKouenSys
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vit129.kouen.KouenDaemonTests
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
  KouenCopyModeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/KouenCopyModeTests
    dependencies:
      - package: Kouen
        product: KouenCopyMode
      - package: Kouen
        product: KouenCore
      - package: Kouen
        product: KouenTerminalEngine
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vit129.kouen.KouenCopyModeTests
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
  KouenTerminalKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/KouenTerminalKitTests
    dependencies:
      - package: Kouen
        product: KouenCore
      - package: Kouen
        product: KouenTerminalEngine
      - package: Kouen
        product: KouenCopyMode
      - package: Kouen
        product: KouenTerminalKit
      - package: Kouen
        product: KouenTheme
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vit129.kouen.KouenTerminalKitTests
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
schemes:
  Kouen:
    build:
      targets:
        Kouen: all
        KouenDaemon: all
        kouen-cli: all
        KouenCoreTests: [test]
        KouenDaemonTests: [test]
        KouenTerminalKitTests: [test]
        KouenCopyModeTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - KouenCoreTests
        - KouenDaemonTests
        - KouenTerminalKitTests
        - KouenCopyModeTests
