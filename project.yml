name: Harness
options:
  bundleIdPrefix: com.robert
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
settings:
  base:
    # Harness does not ship App Intents or App Shortcuts. Disabling App Intents
    # link generation keeps Xcode runs from repeatedly talking to linkd's
    # autoShortcut service for metadata we do not use.
    LM_ENABLE_LINK_GENERATION: NO
    LM_FILTER_WARNINGS: YES
    ENABLE_APPINTENTS_DEPLOYMENT_AWARE_PROCESSING: NO
packages:
  Harness:
    path: .
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    # MUST match Package.swift's `.upToNextMinor(from: "2.9.2")` exactly — Sparkle is the
    # auto-update framework, the single most security-sensitive dependency, and a drift here
    # means Xcode builds and SPM builds ship different versions of it under one app version.
    # `minorVersion` is XcodeGen's upToNextMinor; CI's manifest-lint asserts the three pins
    # (Package.swift / project.yml / project.pbxproj) agree.
    minorVersion: 2.9.2
targets:
  Harness:
    type: application
    platform: macOS
    sources:
      - Apps/Harness/Sources/HarnessApp
      - Apps/Harness/Resources/Harness.icns
      - Apps/Harness/Resources/HarnessLogo.png
      - Apps/Harness/Resources/Assets.xcassets
      # Bundled "Symbols Nerd Font Mono" (MIT). A folder reference so it lands at
      # Contents/Resources/Fonts/ verbatim, matching ATSApplicationFontsPath = Fonts.
      - path: Apps/Harness/Resources/Fonts
        type: folder
    dependencies:
      - target: HarnessDaemon
        embed: false
      - target: harness-cli
        embed: false
      - package: Harness
        product: HarnessCore
      - package: Harness
        product: HarnessTerminalKit
      - package: Harness
        product: HarnessTerminalRenderer
      - package: Harness
        product: HarnessTheme
      - package: Harness
        product: HarnessOnboarding
      # Sparkle ships as a binary xcframework via SPM; Xcode auto-embeds + code-signs
      # the resolved Sparkle.framework into Contents/Frameworks. Do NOT set embed/codeSign
      # here — XcodeGen would emit a Copy-Files phase referencing the bare product name
      # "Sparkle" (not "Sparkle.framework"), which fails with `lstat(.../Sparkle): No such
      # file or directory`. (The make-release path embeds it manually in package-app.sh.)
      - package: Sparkle
        product: Sparkle
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.robert.harness
      INFOPLIST_FILE: Apps/Harness/Sources/HarnessApp/Resources/Info.plist
      CODE_SIGN_ENTITLEMENTS: Harness.entitlements
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    postBuildScripts:
      - name: Copy Bundled Tools
        script: |
          set -euo pipefail
          mkdir -p "$TARGET_BUILD_DIR/$EXECUTABLE_FOLDER_PATH"
          cp "$BUILT_PRODUCTS_DIR/HarnessDaemon" "$TARGET_BUILD_DIR/$EXECUTABLE_FOLDER_PATH/HarnessDaemon"
          cp "$BUILT_PRODUCTS_DIR/harness-cli" "$TARGET_BUILD_DIR/$EXECUTABLE_FOLDER_PATH/harness-cli"
        inputFiles:
          - $(BUILT_PRODUCTS_DIR)/HarnessDaemon
          - $(BUILT_PRODUCTS_DIR)/harness-cli
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(EXECUTABLE_FOLDER_PATH)/HarnessDaemon
          - $(TARGET_BUILD_DIR)/$(EXECUTABLE_FOLDER_PATH)/harness-cli
  HarnessDaemonCore:
    type: library.static
    platform: macOS
    sources:
      - Packages/HarnessDaemon/Sources/HarnessDaemon
    dependencies:
      - package: Harness
        product: HarnessCore
      - package: Harness
        product: HarnessTerminalEngine
      - package: Harness
        product: CHarnessSys
    settings:
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
      # Pure-Swift target — no Objective-C consumers. Disabling the generated
      # `-Swift.h` header and defines-module avoids a spurious umbrella-header
      # warning about HarnessDaemonCore-Swift.h.
      SWIFT_INSTALL_OBJC_HEADER: NO
      DEFINES_MODULE: NO
      OTHER_SWIFT_FLAGS: "$(inherited) -Xcc -fmodule-map-file=$(GENERATED_MODULEMAP_DIR)/CHarnessSys.modulemap"
  HarnessDaemon:
    type: tool
    platform: macOS
    sources:
      - Packages/HarnessDaemon/Sources/HarnessDaemonMain
    dependencies:
      - target: HarnessDaemonCore
      - package: Harness
        product: HarnessCore
      - package: Harness
        product: HarnessTerminalEngine
      - package: Harness
        product: CHarnessSys
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.robert.harness.daemon
      PRODUCT_NAME: HarnessDaemon
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
  harness-cli:
    type: tool
    platform: macOS
    sources:
      - Tools/harness/Sources/HarnessCLI
    dependencies:
      - package: Harness
        product: HarnessCore
      - package: Harness
        product: HarnessTerminalEngine
      - package: Harness
        product: HarnessTerminalKit
      - package: Harness
        product: HarnessTheme
      - package: Harness
        product: CHarnessSys
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.robert.harness.cli
      PRODUCT_NAME: harness-cli
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
      OTHER_SWIFT_FLAGS: "$(inherited) -Xcc -fmodule-map-file=$(GENERATED_MODULEMAP_DIR)/CHarnessSys.modulemap"
  HarnessCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/HarnessCoreTests
    dependencies:
      - package: Harness
        product: HarnessCore
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.robert.harness.HarnessCoreTests
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
  HarnessDaemonTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/HarnessDaemonTests
    dependencies:
      - target: HarnessDaemonCore
      - package: Harness
        product: HarnessCore
      - package: Harness
        product: HarnessTerminalEngine
      - package: Harness
        product: CHarnessSys
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.robert.harness.HarnessDaemonTests
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
  HarnessCopyModeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/HarnessCopyModeTests
    dependencies:
      - package: Harness
        product: HarnessCopyMode
      - package: Harness
        product: HarnessCore
      - package: Harness
        product: HarnessTerminalEngine
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.robert.harness.HarnessCopyModeTests
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
  HarnessTerminalKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/HarnessTerminalKitTests
    dependencies:
      - package: Harness
        product: HarnessCore
      - package: Harness
        product: HarnessTerminalEngine
      - package: Harness
        product: HarnessCopyMode
      - package: Harness
        product: HarnessTerminalKit
      - package: Harness
        product: HarnessTheme
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.robert.harness.HarnessTerminalKitTests
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
  # ── SPM test targets surfaced in Xcode ─────────────────────────────────────────
  # Product → Test previously ran only Core/Daemon/Kit/CopyMode — under 40% of the suite —
  # so engine conformance, reflow goldens, renderer parity, theme, onboarding and the
  # compositor parity suites never ran in Xcode (CI's `swift test` covered them, local
  # development didn't). Two SPM test targets stay deliberately SPM-only: HarnessCLITests
  # and HarnessAppTests depend on *executable* targets (harness-cli, HarnessApp), which an
  # Xcode unit-test bundle can't link as a package product — run those via `swift test`.
  HarnessTerminalEngineTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/HarnessTerminalEngineTests
    dependencies:
      - package: Harness
        product: HarnessTerminalEngine
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.robert.harness.HarnessTerminalEngineTests
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
  HarnessThemeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/HarnessThemeTests
    dependencies:
      - package: Harness
        product: HarnessTheme
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.robert.harness.HarnessThemeTests
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
  HarnessTerminalRendererTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/HarnessTerminalRendererTests
    dependencies:
      - package: Harness
        product: HarnessCore
      - package: Harness
        product: HarnessTerminalRenderer
      - package: Harness
        product: HarnessTerminalEngine
      - package: Harness
        product: HarnessTheme
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.robert.harness.HarnessTerminalRendererTests
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
  HarnessOnboardingTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/HarnessOnboardingTests
    dependencies:
      - package: Harness
        product: HarnessOnboarding
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.robert.harness.HarnessOnboardingTests
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
  GridCompositorParityTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/GridCompositorParityTests
    dependencies:
      - package: Harness
        product: HarnessTerminalKit
      - package: Harness
        product: HarnessOnboarding
      - package: Harness
        product: HarnessCore
      - package: Harness
        product: HarnessTerminalEngine
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.robert.harness.GridCompositorParityTests
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
  HarnessBenchmarks:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/HarnessBenchmarks
    dependencies:
      - package: Harness
        product: HarnessCore
      - package: Harness
        product: HarnessTerminalEngine
      - package: Harness
        product: HarnessTerminalKit
      - package: Harness
        product: HarnessTerminalRenderer
      - package: Harness
        product: HarnessTheme
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.robert.harness.HarnessBenchmarks
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "6.0"
      MACOSX_DEPLOYMENT_TARGET: "15.0"
schemes:
  Harness:
    build:
      targets:
        Harness: all
        HarnessDaemon: all
        harness-cli: all
        HarnessCoreTests: [test]
        HarnessDaemonTests: [test]
        HarnessTerminalKitTests: [test]
        HarnessCopyModeTests: [test]
        HarnessTerminalEngineTests: [test]
        HarnessThemeTests: [test]
        HarnessTerminalRendererTests: [test]
        HarnessOnboardingTests: [test]
        GridCompositorParityTests: [test]
        HarnessBenchmarks: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HarnessCoreTests
        - HarnessDaemonTests
        - HarnessTerminalKitTests
        - HarnessCopyModeTests
        - HarnessTerminalEngineTests
        - HarnessThemeTests
        - HarnessTerminalRendererTests
        - HarnessOnboardingTests
        - GridCompositorParityTests
        # Benchmarks are env-gated (HARNESS_BENCHMARKS=1) and skip themselves in a plain
        # test run, so including them costs nothing and lets Xcode run them on demand.
        - HarnessBenchmarks
